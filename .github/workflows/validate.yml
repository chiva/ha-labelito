name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily — hassfest and HACS validation rules change over time; a nightly run surfaces breakage
  # before the next PR.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Not (yet) in the Home Assistant brands repo.
          ignore: brands
