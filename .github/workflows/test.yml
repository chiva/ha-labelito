name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          # pytest-homeassistant-custom-component is welded to one HA core version; single Python
          # version is the norm (matrixing HA versions is the meaningful axis if wanted later).
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest --cov=custom_components.labelito --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
