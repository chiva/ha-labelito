name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          # pytest-homeassistant-custom-component is welded to one HA core version; single Python
          # version is the norm (matrixing HA versions is the meaningful axis if wanted later).
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest --cov=custom_components.labelito --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
