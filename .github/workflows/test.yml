name: Test

on:
  push:
    branches: [main]
    paths: ["**.py", "requirements_test.txt", ".github/workflows/test.yml"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          # pytest-homeassistant-custom-component is welded to one HA core version; single Python
          # version is the norm (matrixing HA versions is the meaningful axis if wanted later).
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest --cov=custom_components.labelito --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
