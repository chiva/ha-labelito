# Enforce a Conventional Commit PR title. release-please derives the version bump and CHANGELOG
# from conventional commits, so the merged commit (squash-merge → PR title) must be conventional.
name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: Conventional commit PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
