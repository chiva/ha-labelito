name: Hassfest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily — hassfest validation rules change over time; a nightly run surfaces breakage before the
  # next PR.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
            persist-credentials: false
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master
