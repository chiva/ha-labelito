name: Hassfest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily — hassfest validation rules change over time; a nightly run surfaces breakage before the
  # next PR.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
            persist-credentials: false
      - uses: home-assistant/actions/hassfest@e3fb68ebda13d88a0d695082f471ba2c83d025fb # master
