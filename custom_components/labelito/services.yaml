print:
  name: Print label
  description: >-
    Print a physical label on the Brother QL printer via labelito. The label layout comes from a
    named labelito template (see the labelito web UI or GET /templates for the catalog); the
    template's placeholders are filled from the "fields" object. The template name is validated
    against the live template list before printing, and a mismatch between the template's media
    and the loaded roll is rejected by the printer service with a clear error. Optionally returns
    a response with the job id and whether it was printed or a dry run.
  fields:
    template:
      name: Template
      description: >-
        Name of the labelito template to print, for example "pantry" or "freezer-dated". Must be
        one of the templates the labelito service currently serves; unknown names fail with the
        list of valid templates.
      required: true
      example: pantry
      selector:
        text:
    fields:
      name: Fields
      description: >-
        Values for the template's placeholders, as a mapping of field name to value. Each
        template declares required and optional fields; missing required fields are rejected.
      example: '{"title": "Tomato soup", "subtitle": "Frozen 2026-07-01"}'
      selector:
        object:
    copies:
      name: Copies
      description: Number of identical copies to print (1-10).
      default: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box
    dry_run:
      name: Dry run
      description: >-
        Render and validate the label without sending anything to the printer. Useful for testing
        templates and field values.
      default: false
      selector:
        boolean:
    language:
      name: Language
      description: >-
        BCP-47 language tag (for example "en" or "es") for the label's translated chrome and date
        formatting. Defaults to the labelito server's configured language.
      example: en
      selector:
        text:
    cut:
      name: Cut
      description: Cut the label after printing. Defaults to true on the server.
      selector:
        boolean:
    red:
      name: Red
      description: >-
        Two-color (red/black) printing for supported printers and DK-2225x black/red media.
        Leave unset to inherit the server default.
      selector:
        boolean:
    dither:
      name: Dither
      description: >-
        Approximate greys with Floyd-Steinberg dithering. Leave unset to inherit the server
        default.
      selector:
        boolean:
    idempotency_key:
      name: Idempotency key
      description: >-
        Optional stable key that lets labelito recognise a replayed request. Pass a fixed value
        (unique per logical label) when an automation may retry after an ambiguous failure — a
        lost response or timeout after the label was already sent — so the same label is not
        printed twice. Leave unset for a fresh key per call.
      example: pantry-tomato-soup-2026-07-01
      selector:
        text:
    config_entry_id:
      name: labelito instance
      description: >-
        Which configured labelito service to print on. Only needed when more than one is
        configured.
      selector:
        config_entry:
          integration: labelito
    sequence:
      collapsed: true
      name: Auto-numbering
      description: >-
        Print a numbered batch instead of copies of one label. Only for templates that use the
        {{seq}} token; the count replaces "copies" (the two cannot be combined). Set the number of
        labels in "Count" to enable it.
      fields:
        seq_count:
          name: Count
          description: >-
            Number of labels in the batch (1-500). Setting this turns the print into an
            auto-numbered sequence; leave it empty for an ordinary print.
          example: 50
          selector:
            number:
              min: 1
              max: 500
              mode: box
        seq_start:
          name: Start
          description: First number in the sequence. Defaults to 1 on the server.
          example: 1
          selector:
            number:
              min: -1000000000
              max: 1000000000
              mode: box
        seq_step:
          name: Step
          description: Increment between consecutive numbers (>= 1). Defaults to 1 on the server.
          example: 1
          selector:
            number:
              min: 1
              max: 1000000
              mode: box
        seq_padding:
          name: Padding
          description: >-
            Minimum digit width, zero-padded (for example 3 renders 1 as "001"). 0 means no
            padding, up to 32. Defaults to 0 on the server.
          example: 3
          selector:
            number:
              min: 0
              max: 32
              mode: box
reprint_last:
  name: Reprint last label
  description: >-
    Print the most recent label that was printed through Home Assistant again, exactly as it came
    out the first time (same template, fields, and rendering options). Fails if nothing has been
    printed through Home Assistant since it last restarted.
  fields:
    config_entry_id:
      name: labelito instance
      description: >-
        Which configured labelito service to reprint on. Only needed when more than one is
        configured.
      selector:
        config_entry:
          integration: labelito
