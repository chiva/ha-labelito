# Download the repo's custom_sentences/ folder into <config>/ so this lands at
# <config>/custom_sentences/en/labelito.yaml (integrations cannot ship custom sentences;
# Home Assistant only loads them from config). See docs/voice-assist.md.
language: "en"
intents:
  LabelitoPrint:
    data:
      - sentences:
          - "print [a] {template} label [for] {text}"
          - "print [a] {template} label [that says] {text}"
          - "make [a] {template} label [for] {text}"
          - "make [a] {template} label [that says] {text}"
      - sentences:
          - "print [a] {template} label"
          - "make [a] {template} label"
lists:
  template:
    wildcard: true
  text:
    wildcard: true
