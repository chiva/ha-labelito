# Descarga la carpeta custom_sentences/ del repositorio en <config>/ para que este archivo quede en
# <config>/custom_sentences/es/labelito.yaml (las integraciones no pueden incluir frases
# personalizadas; Home Assistant solo las carga desde config). Ver docs/voice-assist.md.
language: "es"
intents:
  LabelitoPrint:
    data:
      - sentences:
          - "imprime una etiqueta [de] {template} para {text}"
          - "imprime una etiqueta [de] {template} que diga {text}"
          - "haz una etiqueta [de] {template} para {text}"
          - "haz una etiqueta [de] {template} que diga {text}"
      - sentences:
          - "imprime una etiqueta [de] {template}"
          - "haz una etiqueta [de] {template}"
lists:
  template:
    wildcard: true
  text:
    wildcard: true
